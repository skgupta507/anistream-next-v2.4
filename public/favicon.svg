<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1c0812"/>
      <stop offset="100%" stop-color="#07060b"/>
    </radialGradient>
    <radialGradient id="sk" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#d4455a"/>
      <stop offset="55%" stop-color="#c0394d"/>
      <stop offset="100%" stop-color="#7a1522"/>
    </radialGradient>
    <radialGradient id="eg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ff5575" stop-opacity="1"/>
      <stop offset="65%" stop-color="#c0394d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6b0d1a" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="gl" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <!-- LEFT HORN - base at y=20, tip at y=2 -->
  <path d="M18 20 C15 12 13 6 16 2 C19 6 20 12 20 20Z" fill="#c0394d" opacity=".9"/>
  <path d="M18 20 C16 13 15 7 17 3 C18 7 19 13 19 20Z" fill="#e06070" opacity=".4"/>
  <!-- RIGHT HORN - base at y=20, tip at y=2 -->
  <path d="M46 20 C49 12 51 6 48 2 C45 6 44 12 44 20Z" fill="#c0394d" opacity=".9"/>
  <path d="M46 20 C48 13 49 7 47 3 C46 7 45 13 45 20Z" fill="#e06070" opacity=".4"/>
  <!-- CRANIUM - centred at (32,28), visible from y=18 -->
  <ellipse cx="32" cy="30" rx="18" ry="16" fill="url(#sk)" filter="url(#gl)"/>
  <!-- BROW RIDGE - visible between horns and eyes -->
  <path d="M16 26 Q32 22 48 26" fill="none" stroke="#8b1a28" stroke-width="2.5" stroke-linecap="round"/>
  <!-- CHEEKBONES / SIDE WALLS -->
  <path d="M15 33 C13 40 15 49 19 53 L22 52 C18 48 16 42 17 36Z" fill="#9e2535" opacity=".75"/>
  <path d="M49 33 C51 40 49 49 45 53 L42 52 C46 48 48 42 47 36Z" fill="#9e2535" opacity=".75"/>
  <!-- JAW -->
  <path d="M22 48 Q32 55 42 48 L41 57 Q32 62 23 57Z" fill="#7a1522"/>
  <!-- TEETH -->
  <rect x="25"   y="53" width="3.5" height="5"   rx="1.2" fill="#f0eaf5" opacity=".93"/>
  <rect x="29.5" y="52" width="3.5" height="6.5" rx="1.2" fill="#f0eaf5" opacity=".96"/>
  <rect x="34"   y="52" width="3.5" height="6.5" rx="1.2" fill="#f0eaf5" opacity=".96"/>
  <rect x="38.5" y="53" width="3"   height="5"   rx="1.2" fill="#f0eaf5" opacity=".88"/>
  <!-- NASAL CAVITY -->
  <path d="M29 38 L32 33 L35 38 L34 42 L30 42Z" fill="#07060b" opacity=".88"/>
  <!-- LEFT EYE SOCKET -->
  <ellipse cx="23" cy="30" rx="6" ry="5.5" fill="#07060b" opacity=".92"/>
  <ellipse cx="23" cy="30" rx="4"  ry="3.8" fill="url(#eg)" filter="url(#gl)"/>
  <ellipse cx="23" cy="30" rx="1.6" ry="3.2" fill="#07060b"/>
  <ellipse cx="21.5" cy="28" rx="1" ry="1.5" fill="rgba(255,255,255,0.45)" transform="rotate(-15,21.5,28)"/>
  <!-- RIGHT EYE SOCKET -->
  <ellipse cx="41" cy="30" rx="6" ry="5.5" fill="#07060b" opacity=".92"/>
  <ellipse cx="41" cy="30" rx="4"  ry="3.8" fill="url(#eg)" filter="url(#gl)"/>
  <ellipse cx="41" cy="30" rx="1.6" ry="3.2" fill="#07060b"/>
  <ellipse cx="39.5" cy="28" rx="1" ry="1.5" fill="rgba(255,255,255,0.45)" transform="rotate(-15,39.5,28)"/>
  <!-- SKULL CRACK -->
  <path d="M32 18 L31 23 L33 27 L32 31" fill="none" stroke="rgba(90,13,26,0.65)" stroke-width="1" stroke-linecap="round"/>
</svg>
